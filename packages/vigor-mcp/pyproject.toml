[project]
name = "vigor-mcp"
version = "0.1.0"
description = "VIGOR MCP bridge: expose Model Context Protocol servers as a vigor-core ToolBackend."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
authors = [{ name = "The VIGOR Authors" }]

dependencies = [
  "vigor-core",
]

[project.optional-dependencies]
mcp = ["mcp>=1.0"]
test = ["pytest>=8", "pytest-asyncio>=0.23"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vigor_mcp"]

[tool.uv.sources]
vigor-core = { workspace = true }
