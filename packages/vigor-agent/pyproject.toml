[project]
name = "vigor-agent"
version = "0.1.0"
description = "Configurable VIGOR agent: AgentConfig loader, adapter registry, router, multi-adapter orchestration."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
authors = [{ name = "The VIGOR Authors" }]

dependencies = [
  "pydantic>=2.8",
  "pyyaml>=6.0",
  "typer>=0.12",
  "vigor-core",
  "vigor-runtime",
]

[project.scripts]
vigor-agent = "vigor_agent.cli:app"

[project.optional-dependencies]
test = ["pytest>=8", "pytest-asyncio>=0.23"]
mcp = ["vigor-mcp"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vigor_agent"]

[tool.uv.sources]
vigor-core = { workspace = true }
vigor-runtime = { workspace = true }
vigor-mcp = { workspace = true }
