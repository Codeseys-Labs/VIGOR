[project]
name = "vigor-backend-strands"
version = "0.1.0"
description = "VIGOR agent backend built on the Strands Agents Python SDK."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
authors = [{ name = "The VIGOR Authors" }]

dependencies = [
  "pydantic>=2.8",
  "vigor-core",
]

[project.optional-dependencies]
strands = ["strands-agents>=1.37,<2", "mcp>=1.0"]
openai = ["strands-agents[openai]>=1.37,<2"]
anthropic = ["strands-agents[anthropic]>=1.37,<2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vigor_backend_strands"]

[tool.uv.sources]
vigor-core = { workspace = true }
