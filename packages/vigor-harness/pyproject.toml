[project]
name = "vigor-harness"
version = "0.1.0"
description = "Meta-Harness-style evaluation utilities for VIGOR harness candidates."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
authors = [{ name = "The VIGOR Authors" }]

dependencies = ["pydantic>=2.8", "vigor-core", "vigor-runtime"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vigor_harness"]

[tool.uv.sources]
vigor-core = { workspace = true }
vigor-runtime = { workspace = true }
