[project]
name = "vigor-core"
version = "0.1.0"
description = "VIGOR core: schemas, adapter/backend interfaces, run archive, scoring, frontier."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
authors = [{ name = "The VIGOR Authors" }]

dependencies = [
  "pydantic>=2.8",
  "typing-extensions>=4.10; python_version<'3.12'",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vigor_core"]
