[project]
name = "vigor-adapter-photo"
version = "0.1.0"
description = "VIGOR domain adapter for agentic photo editing."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
authors = [{ name = "The VIGOR Authors" }]

dependencies = [
  "pydantic>=2.8",
  "Pillow>=10.0",
  "numpy>=1.26",
  "vigor-core",
]

[project.optional-dependencies]
raw = ["rawpy>=0.22"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vigor_adapter_photo"]

[tool.uv.sources]
vigor-core = { workspace = true }
