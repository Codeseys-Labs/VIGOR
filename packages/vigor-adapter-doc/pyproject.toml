[project]
name = "vigor-adapter-doc"
version = "0.1.0"
description = "VIGOR domain adapter for structured documents (LaTeX + Markdown -> PDF)."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
authors = [{ name = "The VIGOR Authors" }]

dependencies = ["pydantic>=2.8", "vigor-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vigor_adapter_doc"]

[tool.uv.sources]
vigor-core = { workspace = true }
