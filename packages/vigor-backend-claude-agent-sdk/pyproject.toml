[project]
name = "vigor-backend-claude-agent-sdk"
version = "0.1.0"
description = "VIGOR agent backend built on the Claude Agent SDK."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
authors = [{ name = "The VIGOR Authors" }]

dependencies = [
  "pydantic>=2.8",
  "vigor-core",
]

[project.optional-dependencies]
claude = ["claude-agent-sdk>=0.1.68,<0.2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vigor_backend_claude_agent_sdk"]

[tool.uv.sources]
vigor-core = { workspace = true }
