[project]
name = "vigor-runtime"
version = "0.1.0"
description = "VIGOR runtime: async orchestrator, budgets, echo backend, CLI."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
authors = [{ name = "The VIGOR Authors" }]

dependencies = [
  "pydantic>=2.8",
  "typer>=0.12",
  "vigor-core",
]

[project.scripts]
vigor = "vigor_runtime.cli:app"

[project.optional-dependencies]
test = ["pytest>=8", "pytest-asyncio>=0.23"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vigor_runtime"]

[tool.uv.sources]
vigor-core = { workspace = true }
